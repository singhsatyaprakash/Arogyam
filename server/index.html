<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arogyam – स्वास्थ्य | API Server</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1f0d 0%, #1a3d1a 50%, #2d1a1a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      color: #e8f5e9;
      overflow-x: hidden;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 56px 48px;
      max-width: 540px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: cardSlideIn 0.6s ease-out;
    }

    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-icon {
      font-size: 3.6rem;
      background: linear-gradient(135deg, #e53935 0%, #ff6b6b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 16px rgba(229,57,53,0.35));
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #ffffff;
      line-height: 1.3;
    }

    h1 span {
      background: linear-gradient(135deg, #66bb6a 0%, #81c784 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #a5d6a7;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .divider {
      width: 70px;
      height: 4px;
      background: linear-gradient(90deg, #e53935, #66bb6a);
      border-radius: 4px;
      margin: 26px auto;
      animation: expandWidth 0.8s ease-out 0.15s both;
    }

    @keyframes expandWidth {
      from {
        width: 0;
        opacity: 0;
      }
      to {
        width: 70px;
        opacity: 1;
      }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(102,187,106,0.15);
      border: 1.5px solid rgba(102,187,106,0.5);
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 0.88rem;
      color: #81c784;
      margin-bottom: 28px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      animation: badgeSlideIn 0.6s ease-out 0.2s both;
    }

    @keyframes badgeSlideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #66bb6a;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { 
        box-shadow: 0 0 0 0 rgba(102,187,106,0.7);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 0 0 8px rgba(102,187,106,0);
        transform: scale(1.1);
      }
    }

    .description {
      font-size: 0.95rem;
      color: #c8e6c9;
      line-height: 1.8;
      margin-bottom: 32px;
      animation: descriptionFadeIn 0.8s ease-out 0.3s both;
    }

    @keyframes descriptionFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .description strong {
      color: #e8f5e9;
      font-weight: 700;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 60px;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 28px rgba(229,57,53,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 36px rgba(229,57,53,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn:active {
      transform: translateY(-2px) scale(0.98);
    }

    /* Contact / Social */
    .contact-label {
      margin-top: 30px;
      margin-bottom: 12px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #81c784;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.25rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1.5px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
    }

    .social-links a:hover {
      transform: translateY(-6px) scale(1.15);
      border-color: rgba(255,255,255,0.3);
    }

    .social-links a.instagram { background: #833ab4; color: #fff; }
    .social-links a.instagram:hover { box-shadow: 0 6px 20px rgba(131,58,180,0.6); }

    .social-links a.facebook  { background: #1877f2; color: #fff; }
    .social-links a.facebook:hover  { box-shadow: 0 6px 20px rgba(24,119,242,0.6); }

    .social-links a.telegram  { background: #0088cc; color: #fff; }
    .social-links a.telegram:hover  { box-shadow: 0 6px 20px rgba(0,136,204,0.6); }

    .social-links a.whatsapp  { background: #25d366; color: #fff; }
    .social-links a.whatsapp:hover  { box-shadow: 0 6px 20px rgba(37,211,102,0.6); }

    .social-links a.email     { background: #e53935; color: #fff; }
    .social-links a.email:hover     { box-shadow: 0 6px 20px rgba(229,57,53,0.6); }

    .footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #81c784;
      animation: footerFadeIn 0.8s ease-out 0.4s both;
    }

    @keyframes footerFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .footer a {
      color: #a5d6a7;
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 600;
    }

    .footer a:hover {
      color: #81c784;
      text-decoration: underline;
    }

    .footer i {
      color: #ff6b6b;
      font-size: 0.75rem;
      animation: heartBeat 0.5s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .card {
        padding: 40px 32px;
        border-radius: 24px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .logo-icon {
        font-size: 3rem;
      }

      .btn {
        padding: 14px 36px;
        font-size: 1rem;
      }

      .social-links {
        gap: 10px;
      }

      .social-links a {
        width: 44px;
        height: 44px;
        font-size: 1.1rem;
      }

      .description {
        font-size: 0.9rem;
      }

      .tagline {
        font-size: 0.9rem;
      }

      .contact-label {
        font-size: 0.7rem;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
        border-radius: 20px;
        max-width: 100%;
      }

      h1 {
        font-size: 1.5rem;
      }

      .logo-icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }

      .divider {
        width: 50px;
        margin: 18px auto;
      }

      .btn {
        padding: 12px 28px;
        font-size: 0.95rem;
        gap: 8px;
      }

      .social-links a {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }

      .description {
        font-size: 0.85rem;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .tagline {
        font-size: 0.85rem;
      }

      .status-badge {
        font-size: 0.8rem;
        padding: 8px 16px;
      }

      .footer {
        font-size: 0.75rem;
        margin-top: 24px;
      }

      .btn:hover {
        transform: translateY(-2px) scale(1.01);
      }

      .social-links a:hover {
        transform: translateY(-4px) scale(1.1);
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo-icon">
      <i class="fa-solid fa-stethoscope"></i>
    </div>

    <h1>Arogyam <span>स्वास्थ्य</span></h1>
    <p class="tagline">Healthcare &nbsp;·&nbsp; Appointments &nbsp;·&nbsp; Teleconsultation</p>

    <div class="divider"></div>

    <div class="status-badge">
      <span class="dot"></span>
      Backend Server is Running
    </div>

    <p class="description">
      This is the <strong>REST API &amp; Socket server</strong> for Arogyam स्वास्थ्य.<br/>
      To access the full application, please visit the frontend below.
    </p>

    <a class="btn" href="https://arogyam-swasthya.onrender.com/" target="_blank" rel="noopener noreferrer">
      <i class="fa-solid fa-arrow-up-right-from-square"></i>
      Open Application
    </a>

    <p class="contact-label">Connect with us</p>

    <div class="social-links">
      <a class="instagram" href="https://instagram.com/abhiyanta_cse" target="_blank" rel="noopener noreferrer" title="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
      <a class="facebook" href="https://facebook.com/" target="_blank" rel="noopener noreferrer" title="Facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
      <a class="telegram" href="https://t.me/" target="_blank" rel="noopener noreferrer" title="Telegram">
        <i class="fa-brands fa-telegram"></i>
      </a>
      <a class="whatsapp" href="https://wa.me/" target="_blank" rel="noopener noreferrer" title="WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
      </a>
      <a class="email" href="mailto:contact@arogyam.com" title="Email">
        <i class="fa-solid fa-envelope"></i>
      </a>
    </div>

    <div class="footer">
      Built with <i class="fa-solid fa-heart"></i> by
      <a href="https://github.com/singhsatyaprakash" target="_blank" rel="noopener noreferrer">@abhiyanta_cse</a>
    </div>

  </div>
</body>
</html>
